<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danilo Gesso</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <img src="img/logo.png" class="logo">
    <h1>Danilo Gesso</h1>
    <p>Qualidade que transforma seu ambiente</p>
</header>

<section class="hero">
    <h2>Garantia de até 6 meses</h2>
    <p>Acabamento profissional e confiança</p>
    <button onclick="irServicos()">Ver nossos serviços</button>
</section>

<section class="info">
    <h2>Bem-vindo</h2>
    <p>Especialistas em gesso com acabamento profissional.</p>
    <p>📞 (62) 991889486</p>
    <p>📧 danilogessocomqualidade@gmail.com</p>
</section>

<section class="avaliacoes">
    <h2>Avalie nosso serviço</h2>
    <textarea id="avaliacaoTexto"></textarea><br><br>
    <button onclick="enviarAvaliacao()">Enviar</button>
    <div id="listaAvaliacoes"></div>
</section>

<div class="orcamento">
    <button onclick="abrirOpcoes()">Solicitar orçamento</button>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <h3>Escolha o serviço</h3>
        <select id="servico">
            <option>Rebaixamento</option>
            <option>Forro</option>
            <option>Gesso</option>
            <option>Molduras</option>
            <option>Cortineiras</option>
            <option>Sancas</option>
            <option>Divisórias</option>
            <option>Reparos</option>
        </select>
        <button onclick="enviarWhats()">Continuar</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
